<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KiteSearch</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:#1a1a2e;min-height:100vh;display:flex;align-items:center;justify-content:center}
.phone{width:390px;height:844px;background:#111b21;border-radius:44px;box-shadow:0 0 0 10px #0a0a0a,0 40px 80px rgba(0,0,0,0.6);overflow:hidden;display:flex;flex-direction:column}
.header{background:#202c33;padding:12px 16px;display:flex;align-items:center;gap:12px}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#005c4b,#00a884);display:flex;align-items:center;justify-content:center;font-size:20px}
.name{color:#e9edef;font-weight:600;font-size:15px}
.status{color:#00a884;font-size:12px}
.chat{flex:1;overflow-y:auto;padding:12px 16px;background:#0b141a;display:flex;flex-direction:column;gap:8px}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.msg{max-width:80%;padding:8px 12px;border-radius:8px;font-size:13.5px;line-height:1.5;animation:fadeIn 0.2s ease;white-space:pre-wrap;word-wrap:break-word}
.msg.in{background:#202c33;color:#e9edef;align-self:flex-start;border-top-left-radius:2px}
.msg.out{background:#005c4b;color:#e9edef;align-self:flex-end;border-top-right-radius:2px}
.msg strong{font-weight:600}
.time{font-size:11px;color:#8696a0;margin-top:2px;padding:0 4px}
.time.right{text-align:right}
.typing{display:none;align-self:flex-start;background:#202c33;padding:12px 16px;border-radius:8px;gap:4px;align-items:center}
.typing.on{display:flex}
.dot{width:7px;height:7px;border-radius:50%;background:#8696a0;animation:bounce 1.4s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-6px);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.suggestions{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;background:#111b21;border-top:1px solid #222d34}
.suggestions::-webkit-scrollbar{display:none}
.chip{background:rgba(0,168,132,0.1);border:1px solid rgba(0,168,132,0.25);color:#00a884;padding:6px 14px;border-radius:20px;font-size:12px;font-family:'Sora',sans-serif;white-space:nowrap;cursor:pointer}
.chip:hover{background:rgba(0,168,132,0.2)}
.input-area{background:#111b21;padding:8px 12px;display:flex;align-items:flex-end;gap:8px}
.input-wrap{flex:1;background:#2a3942;border-radius:24px;display:flex;align-items:flex-end;padding:8px 16px;gap:8px}
textarea{flex:1;background:none;border:none;outline:none;color:#e9edef;font-family:'Sora',sans-serif;font-size:14px;resize:none;max-height:120px;line-height:1.4}
textarea::placeholder{color:#8696a0}
.send{width:48px;height:48px;border-radius:50%;background:#00a884;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.send:hover{background:#00c49a}
.send svg{fill:white}
.counter{align-self:center;background:rgba(0,168,132,0.06);border:1px solid rgba(0,168,132,0.15);color:#8696a0;font-size:11px;padding:4px 12px;border-radius:12px}
</style>
</head>
<body>
<div class="phone">
<div class="header">
<div class="avatar">🏠</div>
<div><div class="name">KiteSearch</div><div class="status" id="st">en línea</div></div>
</div>
<div class="chat" id="chat">
<div class="msg in">¡Hola! 👋 Soy *KiteSearch*, tu asistente inmobiliario.\n\n¿Qué estás buscando? Contame tipo de propiedad, zona y presupuesto 🏠</div>
<div class="time">ahora</div>
<div class="typing" id="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>
<div class="suggestions" id="sugg">
<button class="chip" onclick="send('Busco depto 1 dormitorio en alquiler')">🏠 Depto 1 dorm alquiler</button>
<button class="chip" onclick="send('Propiedades en venta en Rosario')">🏗️ Venta en Rosario</button>
<button class="chip" onclick="send('Precios de mercado zona centro')">📊 Precios zona centro</button>
</div>
<div class="input-area">
<div class="input-wrap">
<textarea id="inp" placeholder="Escribí tu búsqueda..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
</div>
<button class="send" onclick="sendMsg()"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
</div>
</div>
<script>
const phone='demo-'+Math.random().toString(36).substr(2,9);
let loading=false;
function fmt(t){return t.replace(/\*(.*?)\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}
function time(){const n=new Date();return n.getHours()+':'+String(n.getMinutes()).padStart(2,'0')}
function addMsg(txt,type){
const chat=document.getElementById('chat');
const typing=document.getElementById('typing');
const d=document.createElement('div');
d.className='msg '+type;
d.innerHTML=fmt(txt);
const t=document.createElement('div');
t.className='time'+(type==='out'?' right':'');
t.textContent=time();
chat.insertBefore(d,typing);
chat.insertBefore(t,typing);
chat.scrollTop=chat.scrollHeight;
}
function setTyping(v){
document.getElementById('typing').className='typing'+(v?' on':'');
document.getElementById('st').textContent=v?'escribiendo...':'en línea';
document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
}
async function sendMsg(){
if(loading)return;
const inp=document.getElementById('inp');
const msg=inp.value.trim();
if(!msg)return;
inp.value='';inp.style.height='auto';
loading=true;
document.getElementById('sugg').style.display='none';
addMsg(msg,'out');
setTyping(true);
try{
const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,phone})});
const d=await r.json();
setTyping(false);
await new Promise(r=>setTimeout(r,300));
if(d.response)addMsg(d.response,'in');
if(d.searchCount&&d.searchLimit){
const c=document.createElement('div');
c.className='counter';
c.textContent='Búsqueda '+d.searchCount+' de '+d.searchLimit+' gratuitas';
const typing=document.getElementById('typing');
document.getElementById('chat').insertBefore(c,typing);
}
}catch(e){setTyping(false);addMsg('Error de conexión. Intentá de nuevo 📡','in');}
loading=false;
}
function send(t){document.getElementById('inp').value=t;sendMsg();}
</script>
</body>
</html>
